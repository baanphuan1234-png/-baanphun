<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบสั่งซื้อสินค้า - ร้าน banmai</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo-container">
      <div class="logo-icon">
        <i class="fa-solid fa-shop"></i>
      </div>
      <div class="logo-text">
        <h1 id="restaurant-name">ร้าน banmai</h1>
        <p id="table-number-display">สแกนสั่งซื้อสินค้า</p>
      </div>
    </div>
    <div class="btn btn-outline btn-sm" id="view-order-status-btn" style="display: none;">
      <i class="fa-solid fa-receipt"></i> ติดตามออเดอร์
    </div>
  </header>

  <!-- Main Container -->
  <div class="container">
    <!-- Search / Filter bar -->
    <div class="card mb-4" style="padding: 1rem;">
      <div style="display: flex; gap: 0.5rem; width: 100%;">
        <div style="position: relative; flex: 1;">
          <i class="fa-solid fa-magnifying-glass" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
          <input type="text" id="search-input" class="form-control" placeholder="ค้นหาสินค้า..." style="padding-left: 2.5rem;">
        </div>
      </div>
    </div>

    <!-- Active Notification Banner -->
    <div id="notification-banner" class="alert-box alert-success" style="display: none; justify-content: space-between; align-items: center;">
      <span id="notification-message">ส่งออเดอร์เรียบร้อยแล้ว! กำลังรอแอดมินยืนยัน</span>
      <button class="btn btn-outline btn-sm" id="close-banner-btn" style="padding: 0.25rem 0.5rem;">ปิด</button>
    </div>

    <!-- Customer Layout: Menu List + Sticky Cart -->
    <div class="customer-layout">
      <!-- Menu Area -->
      <div>
        <h2 class="mb-4" style="font-weight: 700; font-size: 1.5rem;">รายการสินค้าทั้งหมด</h2>
        <div id="loading-spinner" class="loading-spinner"></div>
        <div id="menu-grid" class="menu-grid"></div>
        <div id="empty-menu-message" style="display: none; text-align: center; padding: 3rem; color: var(--text-muted);">
          <i class="fa-solid fa-circle-exclamation" style="font-size: 3rem; margin-bottom: 1rem;"></i>
          <p>ไม่มีสินค้าในขณะนี้</p>
        </div>
      </div>

      <!-- Cart Area (Right Panel / Bottom Sheet on mobile) -->
      <div class="cart-panel" id="cart-panel">
        <div class="cart-header" id="cart-header-toggle">
          <div class="cart-title">
            <i class="fa-solid fa-cart-shopping"></i>
            <span>ตะกร้าสินค้าของคุณ</span>
            <span class="cart-badge" id="cart-count">0</span>
          </div>
          <i class="fa-solid fa-chevron-up" id="cart-chevron" style="display: none;"></i>
        </div>

        <div class="cart-items" id="cart-items-container">
          <div style="text-align: center; color: var(--text-muted); padding-top: 3rem;" id="empty-cart-message">
            <i class="fa-solid fa-basket-shopping" style="font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.5;"></i>
            <p>ตะกร้าของคุณยังว่างอยู่</p>
          </div>
        </div>

        <div class="cart-summary">
          <div class="cart-total-row">
            <span>ราคารวมทั้งหมด:</span>
            <span>฿<span id="cart-total-val">0</span></span>
          </div>
          <button class="btn btn-primary btn-lg" id="submit-order-btn" style="width: 100%;" disabled>
            <i class="fa-solid fa-paper-plane"></i> ยืนยันการสั่งซื้อ
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL: PRODUCT DETAIL & FLAVOR SELECTION -->
  <div class="modal" id="product-detail-modal">
    <div class="modal-content" style="max-width: 500px; padding: 1.5rem;">
      <div class="modal-header" style="margin-bottom: 1rem;">
        <h3 class="modal-title" id="detail-product-name">ชื่อสินค้า</h3>
        <button class="modal-close" id="close-detail-modal-btn">&times;</button>
      </div>
      
      <img id="detail-product-image" src="" alt="Product Image" style="width: 100%; height: 200px; object-fit: cover; border-radius: var(--radius-md); margin-bottom: 1rem;">
      
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem;">
        <span style="font-weight: 700; font-size: 1.35rem; color: var(--primary);">฿<span id="detail-product-price">0</span></span>
        <span id="detail-overall-stock" style="font-size: 0.85rem; color: var(--text-muted);">คงเหลือ 0 ชิ้น</span>
      </div>

      <!-- Variants Selection Section -->
      <div id="detail-variants-container" style="margin-bottom: 1.5rem;">
        <label style="display: block; margin-bottom: 0.75rem; font-weight: 600; font-size: 0.95rem;">เลือกกลิ่นน้ำยาที่ต้องการ:</label>
        <div id="detail-variants-list" style="display: flex; flex-wrap: wrap; gap: 0.5rem;">
          <!-- Radio pills injected here -->
        </div>
      </div>

      <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 1.25rem; margin-top: 1rem; gap: 1rem;">
        <!-- Quantity Selector -->
        <div style="display: flex; align-items: center; border: 1px solid var(--border-color); border-radius: var(--radius-md); overflow: hidden; background-color: var(--bg-input);">
          <button class="btn btn-sm btn-outline" id="detail-qty-minus-btn" style="border: none; border-radius: 0; padding: 0.5rem 0.85rem;"><i class="fa-solid fa-minus"></i></button>
          <span id="detail-qty-val" style="width: 40px; text-align: center; font-weight: 600; font-size: 1rem;">1</span>
          <button class="btn btn-sm btn-outline" id="detail-qty-plus-btn" style="border: none; border-radius: 0; padding: 0.5rem 0.85rem;"><i class="fa-solid fa-plus"></i></button>
        </div>

        <button class="btn btn-primary" id="detail-add-to-cart-btn" style="flex: 1; padding: 0.75rem;" disabled>
          <i class="fa-solid fa-cart-plus"></i> เพิ่มลงตะกร้า
        </button>
      </div>
    </div>
  </div>

  <!-- Order Status Tracking Modal -->
  <div class="modal" id="order-status-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">ติดตามสถานะออเดอร์</h3>
        <button class="modal-close" id="close-status-modal-btn">&times;</button>
      </div>
      
      <div id="order-status-content">
        <!-- Will be filled dynamically -->
      </div>
    </div>
  </div>

  <script src="app.js?v=2.0"></script>
</body>
</html>
